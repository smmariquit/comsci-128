name: Code quality

on:
  pull_request:
    branches: [staging, main]

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: src/**/*.{ts,tsx,js,jsx}

      - name: Run Biome fix on changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: npx @biomejs/biome check --write --unsafe ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-fix linting issues with Biome"