name: Update Supabase Types

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-types:
    runs-on: ubuntu-latest
    # Added permission block to ensure the bot can write back to your repo
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Types
        run: |
          # Use npx to run the CLI without a global install
          npx supabase gen types typescript --project-id ${{ secrets.SUPABASE_PROJECT_ID }} > src/app/types/database.types.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check for changes
        id: git-check
        run: |
          git add src/app/types/database.types.ts
          git diff --staged --exit-code || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and Push
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -m "chore: sync supabase types"
          git push