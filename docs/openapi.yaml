openapi: 3.0.3
info:
  title: University Student Accommodation Tracker API
  version: 1.1.0
  description: |
    Consolidated OpenAPI reference specification aligned with current code and SRS.

    This file is maintained as a repository-level reference that combines both implemented and planned endpoints for review, planning, and documentation. It is not the split specification currently served by the application runtime.

    Runtime-served specifications are maintained separately in `openapi.implemented.yaml` and `openapi.planned.yaml` under `/api/openapi/*`. When editing API definitions, keep those split specs authoritative for served output and keep this consolidated file synchronized to avoid divergence.

servers:
  - url: /api
    description: Next.js API routes

tags:
  - name: Implemented - OpenAPI
  - name: Implemented - Housing
  - name: Implemented - Rooms
  - name: Implemented - Users
  - name: Planned - Applications
  - name: Planned - Audit Logs
  - name: Planned - Billing
  - name: Planned - Managers
  - name: Planned - Housing Admins
  - name: Planned - Reports
  - name: Planned - Student Views
  - name: Planned - Occupancy
  - name: Planned - Documents

paths:
  /openapi:
    get:
      tags: [Implemented - OpenAPI]
      summary: Fetch raw OpenAPI YAML
      operationId: getOpenApiSpec
      responses:
        '200':
          description: OpenAPI YAML
          content:
            application/yaml:
              schema:
                type: string
        '500':
          $ref: '#/components/responses/InternalError'

  /housing:
    get:
      tags: [Implemented - Housing]
      summary: List housing records
      operationId: getHousingList
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/HousingSortBy'
        - $ref: '#/components/parameters/SortDir'
        - in: query
          name: manager_account_number
          schema:
            type: integer
        - in: query
          name: housing_type
          schema:
            $ref: '#/components/schemas/HousingType'
        - in: query
          name: is_deleted
          schema:
            type: boolean
      responses:
        '200':
          description: Housing list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HousingListResponse'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Implemented - Housing]
      summary: Create housing record
      operationId: createHousing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HousingCreateRequest'
      responses:
        '201':
          description: Housing created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Housing'
        '500':
          $ref: '#/components/responses/InternalError'

  /housing/{housingId}:
    parameters:
      - $ref: '#/components/parameters/HousingId'
    get:
      tags: [Implemented - Housing]
      summary: Get housing by ID (optionally with rooms)
      operationId: getHousingById
      responses:
        '200':
          description: Housing record
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - $ref: '#/components/schemas/Housing'
                      - $ref: '#/components/schemas/HousingWithRooms'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      tags: [Implemented - Housing]
      summary: Update housing by ID
      operationId: updateHousingById
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HousingUpdateRequest'
      responses:
        '200':
          description: Housing updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Housing'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Implemented - Housing]
      summary: Soft-delete housing by ID
      operationId: deactivateHousingById
      responses:
        '200':
          description: Housing deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Housing'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /rooms:
    get:
      tags: [Implemented - Rooms]
      summary: List room records
      operationId: getRoomList
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/RoomSortBy'
        - $ref: '#/components/parameters/SortDir'
        - in: query
          name: housing_id
          schema:
            type: integer
        - in: query
          name: room_type
          schema:
            $ref: '#/components/schemas/RoomType'
        - in: query
          name: occupancy_status
          schema:
            $ref: '#/components/schemas/OccupancyStatus'
        - in: query
          name: payment_status
          schema:
            $ref: '#/components/schemas/PaymentStatus'
        - in: query
          name: is_deleted
          schema:
            type: boolean
      responses:
        '200':
          description: Room list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Implemented - Rooms]
      summary: Create room record
      operationId: createRoom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomCreateRequest'
      responses:
        '201':
          description: Room created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /rooms/{roomId}:
    parameters:
      - $ref: '#/components/parameters/RoomId'
    get:
      tags: [Implemented - Rooms]
      summary: Get room by ID
      operationId: getRoomById
      responses:
        '200':
          description: Room record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Implemented - Rooms]
      summary: Soft-delete room by ID
      operationId: deactivateRoomById
      responses:
        '200':
          description: Room deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Room'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /users:
    get:
      tags: [Implemented - Users]
      summary: List users
      operationId: getUserList
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/UserSortBy'
        - $ref: '#/components/parameters/SortDir'
        - in: query
          name: user_type
          schema:
            $ref: '#/components/schemas/UserType'
        - in: query
          name: is_deleted
          schema:
            type: boolean
        - in: query
          name: q
          schema:
            type: string
          description: Search by name/email
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [Implemented - Users]
      summary: Create user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/{id}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Implemented - Users]
      summary: Get user by ID
      operationId: getUserById
      responses:
        '200':
          description: User record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    patch:
      tags: [Implemented - Users]
      summary: Update user by ID
      operationId: updateUserById
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [Implemented - Users]
      summary: Soft-delete user by ID
      operationId: deactivateUserById
      responses:
        '200':
          description: User deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /applications:
    get:
      tags: [Planned - Applications]
      summary: List applications
      operationId: listApplications
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/ApplicationSortBy'
        - $ref: '#/components/parameters/SortDir'
        - in: query
          name: manager_account_number
          schema: { type: integer }
        - in: query
          name: student_account_number
          schema: { type: integer }
        - in: query
          name: housing_name
          schema: { type: string }
        - in: query
          name: application_status
          schema:
            $ref: '#/components/schemas/ApplicationStatus'
        - in: query
          name: preferred_room_type
          schema:
            $ref: '#/components/schemas/RoomType'
        - in: query
          name: is_deleted
          schema: { type: boolean }
      responses:
        '200':
          description: Application list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'
    post:
      tags: [Planned - Applications]
      summary: Create application
      operationId: createApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationCreateRequest'
      responses:
        '201':
          description: Application created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'

  /applications/{applicationId}:
    parameters:
      - $ref: '#/components/parameters/ApplicationId'
    get:
      tags: [Planned - Applications]
      summary: Get application by ID
      operationId: getApplicationById
      responses:
        '200':
          description: Application record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Planned - Applications]
      summary: Update application by ID
      operationId: updateApplicationById
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationUpdateRequest'
      responses:
        '200':
          description: Application updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
    delete:
      tags: [Planned - Applications]
      summary: Soft-delete application by ID
      operationId: deleteApplicationById
      responses:
        '200':
          description: Application deleted

  /applications/manager/{managerAccountNumber}:
    get:
      tags: [Planned - Applications]
      summary: List applications by manager account number
      operationId: getApplicationsByManager
      parameters:
        - $ref: '#/components/parameters/ManagerAccountNumber'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/ApplicationSortBy'
        - $ref: '#/components/parameters/SortDir'
        - in: query
          name: application_status
          schema:
            $ref: '#/components/schemas/ApplicationStatus'
        - in: query
          name: is_deleted
          schema: { type: boolean }
      responses:
        '200':
          description: Applications for manager
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'

  /applications/manager/{managerAccountNumber}/pending:
    get:
      tags: [Planned - Applications]
      summary: Cursor-paginated pending applications by manager
      description: Mirrors getPendingApplicationsByManagerPaginated complex query.
      operationId: getPendingApplicationsByManagerPaginated
      parameters:
        - $ref: '#/components/parameters/ManagerAccountNumber'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/CursorCreatedAt'
        - $ref: '#/components/parameters/CursorApplicationId'
      responses:
        '200':
          description: Cursor-paginated applications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedApplications'

  /applications/housing/{housingId}:
    get:
      tags: [Planned - Applications]
      summary: List applications by housing ID
      operationId: getApplicationsByHousing
      parameters:
        - $ref: '#/components/parameters/HousingId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/ApplicationSortBy'
        - $ref: '#/components/parameters/SortDir'
      responses:
        '200':
          description: Applications for housing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'

  /audit-logs:
    get:
      tags: [Planned - Audit Logs]
      summary: List audit logs
      operationId: listAuditLogs
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/AuditSortBy'
        - $ref: '#/components/parameters/SortDir'
        - in: query
          name: action_type
          schema:
            $ref: '#/components/schemas/ActionType'
        - in: query
          name: account_number
          schema: { type: integer }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - in: query
          name: q
          schema: { type: string }
          description: Search in audit_description/user_name
      responses:
        '200':
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
    post:
      tags: [Planned - Audit Logs]
      summary: Create audit log
      operationId: createAuditLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditLogCreateRequest'
      responses:
        '201':
          description: Audit log created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLog'

  /audit-logs/{auditId}:
    parameters:
      - $ref: '#/components/parameters/AuditId'
    patch:
      tags: [Planned - Audit Logs]
      summary: Update audit log
      operationId: updateAuditLog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuditLogUpdateRequest'
      responses:
        '200':
          description: Audit log updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLog'

  /audit-logs/account/{accountNumber}:
    get:
      tags: [Planned - Audit Logs]
      summary: List audit logs by account number
      operationId: getAuditLogsByAccount
      parameters:
        - $ref: '#/components/parameters/AccountNumber'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/AuditSortBy'
        - $ref: '#/components/parameters/SortDir'
      responses:
        '200':
          description: Audit logs by account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'

  /bills:
    get:
      tags: [Planned - Billing]
      summary: List bills
      operationId: listBills
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/BillSortBy'
        - $ref: '#/components/parameters/SortDir'
        - in: query
          name: manager_account_number
          schema: { type: integer }
        - in: query
          name: student_account_number
          schema: { type: integer }
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/PaymentStatus'
        - in: query
          name: bill_type
          schema:
            $ref: '#/components/schemas/BillType'
        - in: query
          name: overdue_only
          schema: { type: boolean }
        - in: query
          name: from_due_date
          schema: { type: string, format: date }
        - in: query
          name: to_due_date
          schema: { type: string, format: date }
        - in: query
          name: is_deleted
          schema: { type: boolean }
      responses:
        '200':
          description: Bill list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillListResponse'
    post:
      tags: [Planned - Billing]
      summary: Create bill
      operationId: createBill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillCreateRequest'
      responses:
        '201':
          description: Bill created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bill'

  /bills/{transactionId}:
    parameters:
      - $ref: '#/components/parameters/TransactionId'
    get:
      tags: [Planned - Billing]
      summary: Get bill by transaction ID
      operationId: getBillById
      responses:
        '200':
          description: Bill record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bill'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Planned - Billing]
      summary: Update bill by transaction ID
      operationId: updateBillById
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillUpdateRequest'
      responses:
        '200':
          description: Bill updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bill'
    delete:
      tags: [Planned - Billing]
      summary: Soft-delete bill by transaction ID
      operationId: deleteBillById
      responses:
        '200':
          description: Bill deleted

  /bills/{transactionId}/mark-paid:
    patch:
      tags: [Planned - Billing]
      summary: Mark bill as paid
      operationId: markBillAsPaid
      parameters:
        - $ref: '#/components/parameters/TransactionId'
      responses:
        '200':
          description: Bill marked as paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bill'

  /bills/manager/{accountNumber}:
    get:
      tags: [Planned - Billing]
      summary: List bills by manager account number
      operationId: getBillsByManager
      parameters:
        - $ref: '#/components/parameters/AccountNumber'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/BillSortBy'
        - $ref: '#/components/parameters/SortDir'
      responses:
        '200':
          description: Bills by manager
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillListResponse'

  /bills/student/{accountNumber}:
    get:
      tags: [Planned - Billing]
      summary: List bills by student account number
      operationId: getBillsByStudent
      parameters:
        - $ref: '#/components/parameters/AccountNumber'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/BillSortBy'
        - $ref: '#/components/parameters/SortDir'
      responses:
        '200':
          description: Bills by student
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillListResponse'

  /bills/status/{status}:
    get:
      tags: [Planned - Billing]
      summary: List bills by payment status
      operationId: getBillsByStatus
      parameters:
        - in: path
          name: status
          required: true
          schema:
            $ref: '#/components/schemas/PaymentStatus'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/BillSortBy'
        - $ref: '#/components/parameters/SortDir'
      responses:
        '200':
          description: Bills by status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillListResponse'

  /bills/overdue:
    get:
      tags: [Planned - Billing]
      summary: List overdue pending bills
      operationId: getOverdueBills
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/BillSortBy'
        - $ref: '#/components/parameters/SortDir'
      responses:
        '200':
          description: Overdue bills
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillListResponse'

  /bills/student/{accountNumber}/total-balance:
    get:
      tags: [Planned - Billing]
      summary: Get total pending balance for a student
      operationId: getStudentTotalBalance
      parameters:
        - $ref: '#/components/parameters/AccountNumber'
      responses:
        '200':
          description: Student total balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  account_number:
                    type: integer
                  total_balance:
                    type: number

  /managers:
    get:
      tags: [Planned - Managers]
      summary: List managers (with user details)
      operationId: listManagers
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - in: query
          name: manager_type
          schema:
            $ref: '#/components/schemas/ManagerType'
        - in: query
          name: is_deleted
          schema: { type: boolean }
      responses:
        '200':
          description: Manager list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagerListResponse'

  /managers/{accountNumber}:
    parameters:
      - $ref: '#/components/parameters/AccountNumber'
    get:
      tags: [Planned - Managers]
      summary: Get manager by account number
      operationId: getManagerById
      responses:
        '200':
          description: Manager record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Manager'
    patch:
      tags: [Planned - Managers]
      summary: Update manager
      operationId: updateManagerById
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManagerUpdateRequest'
      responses:
        '200':
          description: Manager updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Manager'
    delete:
      tags: [Planned - Managers]
      summary: Soft-delete manager
      operationId: deleteManagerById
      responses:
        '200':
          description: Manager deleted

  /manager-banks:
    get:
      tags: [Planned - Managers]
      summary: List manager bank records
      operationId: listManagerBanks
      parameters:
        - in: query
          name: account_number
          schema: { type: integer }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Manager bank list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagerBankListResponse'
    post:
      tags: [Planned - Managers]
      summary: Create manager bank record
      operationId: createManagerBank
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManagerBankCreateRequest'
      responses:
