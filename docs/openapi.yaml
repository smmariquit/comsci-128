components:
  parameters:
    HousingId:
      in: path
      name: housingId
      required: true
      schema: { type: integer }
    RoomId:
      in: path
      name: roomId
      required: true
      schema: { type: integer }
    UserId:
      in: path
      name: id
      required: true
      schema: { type: integer }
    ApplicationId:
      in: path
      name: applicationId
      required: true
      schema: { type: integer }
    AuditId:
      in: path
      name: auditId
      required: true
      schema: { type: integer }
    TransactionId:
      in: path
      name: transactionId
      required: true
      schema: { type: integer }
    AccountNumber:
      in: path
      name: accountNumber
      required: true
      schema: { type: integer }
    ManagerAccountNumber:
      in: path
      name: managerAccountNumber
      required: true
      schema: { type: integer }
    DocumentId:
      in: path
      name: documentId
      required: true
      schema: { type: integer }

    Limit:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Offset:
      in: query
      name: offset
      schema:
        type: integer
        minimum: 0
        default: 0
    SortDir:
      in: query
      name: sort_dir
      schema:
        type: string
        enum: [asc, desc]
        default: desc

    CursorCreatedAt:
      in: query
      name: cursor_created_at
      schema:
        type: string
        format: date-time
    CursorApplicationId:
      in: query
      name: cursor_application_id
      schema: { type: integer }

    HousingSortBy:
      in: query
      name: sort_by
      schema:
        type: string
        enum: [housing_name, rent_price, start_application_date, end_application_date, housing_id]
        default: housing_name
    RoomSortBy:
      in: query
      name: sort_by
      schema:
        type: string
        enum: [room_id, housing_id, room_type, occupancy_status, payment_status]
        default: room_id
    UserSortBy:
      in: query
      name: sort_by
      schema:
        type: string
        enum: [last_name, first_name, account_email, account_number, user_type]
        default: account_number
    ApplicationSortBy:
      in: query
      name: sort_by
      schema:
        type: string
        enum: [application_id, expected_moveout_date, actual_moveout_date, application_status, housing_name, preferred_room_type]
        default: application_id
    BillSortBy:
      in: query
      name: sort_by
      schema:
        type: string
        enum: [transaction_id, due_date, issue_date, amount, status, bill_type]
        default: issue_date
    AuditSortBy:
      in: query
      name: sort_by
      schema:
        type: string
        enum: [timestamp, audit_id, action_type, user_name]
        default: timestamp

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        error:
          type: string

    ListMeta:
      type: object
      properties:
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer
          nullable: true

    CursorMeta:
      type: object
      properties:
        has_next_page:
          type: boolean

    HousingType:
      type: string
      enum: [Non-UP Housing, UP Housing]
    RoomType:
      type: string
      enum: [Single, Double, Shared]
    OccupancyStatus:
      type: string
      enum: [Fully Occupied, Empty, Partially Occupied]
    PaymentStatus:
      type: string
      enum: [Pending, Paid, Overdue]
    UserType:
      type: string
      enum: [Student, Manager, System Admin]
    Sex:
      type: string
      enum: [Male, Female, Prefer not to say]
    ApplicationStatus:
      type: string
      enum: [Pending, Rejected, Approved, Cancelled]
